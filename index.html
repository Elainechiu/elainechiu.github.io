<!DOCTYPE html>

<head>

  <meta name="keywords" content="Elaine K. Chiu, Elaine Chiu, Statistics, UW–Madison, UW–Seattle, Causal Inference, Sensitivity Analysis, Observational Studies, Nonparametric Methods, PhD, University of Wisconsin–Madison" />

  <style>
    :root {
      --bg: #f7f4ef;
      --surface: #fdfbf7;
      --surface-2: #f3eee7;
      --text: #2a2a2a;
      --muted: #7a766f;
      --border: #e6e0d8;
      --link: #3b6ea8;
      --link-hover: #2f5a8c;
      --shadow: 0 8px 24px rgba(60, 50, 40, 0.08);
      --nav-bg: rgba(253, 251, 247, 0.75);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161513;
        --surface: #1e1c19;
        --surface-2: #26231f;
        --text: #e8e3dc;
        --muted: #b0a79c;
        --border: #3a342c;
        --link: #9bbcf2;
        --link-hover: #c2d6ff;
        --shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
        --nav-bg: rgba(22, 21, 19, 0.75);
      }
    }

    html[data-theme="light"] {
      --bg: #f7f4ef;
      --surface: #fdfbf7;
      --surface-2: #f3eee7;
      --text: #2a2a2a;
      --muted: #7a766f;
      --border: #e6e0d8;
      --link: #3b6ea8;
      --link-hover: #2f5a8c;
      --shadow: 0 8px 24px rgba(60, 50, 40, 0.08);
      --nav-bg: rgba(253, 251, 247, 0.75);
    }

    html[data-theme="dark"] {
      --bg: #161513;
      --surface: #1e1c19;
      --surface-2: #26231f;
      --text: #e8e3dc;
      --muted: #b0a79c;
      --border: #3a342c;
      --link: #9bbcf2;
      --link-hover: #c2d6ff;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
      --nav-bg: rgba(22, 21, 19, 0.75);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, var(--bg), #f2ede6);
      color: var(--text);
      line-height: 1.75;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .topbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    nav {
      text-align: center;
      margin-bottom: 30px;
    }

    nav .nav-inner {
      display: inline-flex;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 18px;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 0 20px 60px;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); }

    footer {
      text-align: center;
      color: var(--muted);
      margin-top: 30px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>Elaine K. Chiu</div>
    <button id="theme-toggle" class="theme-toggle">Toggle</button>
  </div>
</div>

<header>
  <h1>Elaine K. Chiu</h1>
  <p>Ph.D. in Statistics · UW–Madison</p>
</header>

<nav>
  <div class="nav-inner">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="software.html">Software</a>
    <a href="teaching.html">Teaching</a>
  </div>
</nav>

<main>

<section>
  <p>
    I am a Ph.D. student in Statistics at UW–Madison working on causal inference,
    sensitivity analysis, and statistical computing.
  </p>
</section>

<footer>
  © 2025 Elaine K. Chiu
</footer>

</main>

<script>
(function () {
  const root = document.documentElement;
  const toggleBtn = document.getElementById("theme-toggle");
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme) root.setAttribute("data-theme", savedTheme);
  else root.setAttribute("data-theme", "dark");

  toggleBtn.onclick = function () {
    const current = root.getAttribute("data-theme");
    const next = current === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
  };
})();
</script>

</body>
</html>
